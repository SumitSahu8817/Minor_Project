<main class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h3>Your Classes</h3>
        <button class="primary-btn" onclick="document.getElementById('addClassSection').classList.toggle('show')">+ Add New Class</button>
    </div>

    <div id="addClassSection" class="form-toggle-section">
        <h4>Setup New Class</h4>
        <form id="newClassForm">
            <input type="text" id="subjectInput" placeholder="Subject Name" required class="input-box">
            <input type="number" id="studentsInput" placeholder="Students Count" required class="input-box">
            <input type="number" id="daysInput" placeholder="Semester Days" required class="input-box">
            <input type="file" id="syllabusFile" accept=".pdf, image/*" class="input-box">
            <button type="submit" id="saveBtn" class="primary-btn">Scan & Save</button>
        </form>
    </div>

    <div id="classesContainer" class="class-grid animate-fade-in"></div>
</main>
