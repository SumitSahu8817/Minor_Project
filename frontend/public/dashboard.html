<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | Faculty Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <button id="themeToggle" class="theme-toggle">🌙</button>
  <nav class="navbar">
    <h2>Faculty Dashboard</h2>
    <button id="logoutBtn" class="danger-btn">Logout</button>
  </nav>

  <main class="container">
    <h3>Your Classes</h3>
    <div id="classesContainer" class="class-grid"></div>

    <div class="planner-controls" style="margin-top: 40px; padding: 25px; background: var(--bg-secondary); border-radius: 8px; box-shadow: var(--card-shadow);">
        <h4 style="margin-bottom: 15px; color: var(--text-primary);">Add New Class (With Auto-Syllabus)</h4>
        
        <form id="newClassForm">
          <label>Subject Name</label>
          <input type="text" id="subjectInput" placeholder="e.g., Computer Networks" required class="input-box">
          
          <label>Number of Students</label>
          <input type="number" id="studentsInput" placeholder="e.g., 60" required class="input-box">
          
          <label>Number of Days in Semester</label>
          <input type="number" id="daysInput" placeholder="e.g., 40" required class="input-box">

          <label>Upload Syllabus (PDF or Image)</label>
          <input type="file" id="syllabusFile" accept=".pdf, image/jpeg, image/png, image/jpg" required class="input-box" style="padding: 5px;">
          
          <button type="submit" id="saveBtn" class="primary-btn" style="margin-top: 15px;">Add Class & Scan Syllabus</button>
          
          <p id="uploadStatus" style="color: #007bff; text-align: center; margin-top: 10px; display: none; font-weight: bold;">Processing file... Please wait.</p>
        </form>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
