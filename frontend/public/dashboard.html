<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Faculty Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="dark">
    
    <nav class="navbar">
        <h2>Faculty Dashboard</h2>
        <div style="display: flex; gap: 15px; align-items: center;">
            <button id="themeToggle" class="theme-toggle" style="position: static; width: 40px; height: 40px; box-shadow: none;">☀️</button>
            <button id="logoutBtn" class="danger-btn">Logout</button>
        </div>
    </nav>

    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h3>Your Classes</h3>
            <button class="primary-btn" onclick="document.getElementById('addClassSection').classList.toggle('show')">+ Add New Class</button>
        </div>

        <div id="addClassSection" class="form-toggle-section">
            <h4 style="margin-bottom: 15px;">Setup New Class</h4>
            <form id="newClassForm">
                <input type="text" id="subjectInput" placeholder="Subject Name" required class="input-box">
                <input type="number" id="studentsInput" placeholder="Students Count" required class="input-box">
                <input type="number" id="daysInput" placeholder="Semester Days" required class="input-box">
                <input type="file" id="syllabusFile" accept=".pdf, image/*" class="input-box">
                <button type="submit" id="saveBtn" class="primary-btn">Scan & Save</button>
            </form>
        </div>

        <div id="classesContainer" class="class-grid animate-fade-in"></div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        // Form Toggle Animation Helper
        function toggleAddClassForm() {
            document.getElementById('addClassSection').classList.toggle('show');
        }
    </script>
</body>
</html>
