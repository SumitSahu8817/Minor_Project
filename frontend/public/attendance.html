<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smart Attendance Tracker</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <style>
    .header-box { background: var(--success-grad, linear-gradient(90deg, #28a745, #20c997)); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
    .stats-bar { display: flex; justify-content: space-between; background: var(--bg-secondary); padding: 15px; border-radius: 8px; font-size: 18px; margin-bottom: 20px; border: 1px solid var(--border-color); }
    .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #dc3545; transition: .4s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #28a745; }
    input:checked + .slider:before { transform: translateX(26px); }
    .btn-group { display: flex; gap: 10px; margin-bottom: 30px; }
    .badge-green { background: #d4edda; color: #155724; padding: 5px 10px; border-radius: 12px; font-weight: bold; }
    .badge-red { background: #f8d7da; color: #721c24; padding: 5px 10px; border-radius: 12px; font-weight: bold; }
  </style>
</head>
<body>
  <button id="globalThemeToggle" class="theme-toggle">🌙</button>
  <nav class="navbar">
    <div style="display: flex; align-items: center; gap: 15px;">
        <button class="secondary-btn" onclick="window.location.href='dashboard.html'">← Dashboard</button>
        <h2>Faculty Attendance System</h2>
    </div>
  </nav>

  <main class="container">
    <div class="header-box">
        <h2>📅 Daily Attendance & Reports</h2>
        <p>Subject: <strong id="subNameDisplay">Loading...</strong></p>
    </div>

    <div class="stats-bar">
        <div>Total Days Taught: <strong id="totalDaysDisplay" style="color:#007bff; font-size:22px;">0</strong></div>
    </div>

    <div class="btn-group">
        <button class="primary-btn" onclick="submitDailyAttendance()">✅ Submit Today's Attendance</button>
        <button class="secondary-btn" onclick="resetTodayCheckboxes()">🔄 Reset Checks</button>
    </div>

    <table class="data-table" id="attendanceTable">
      <thead>
        <tr>
          <th>Roll No.</th>
          <th>Today's Status (P/A)</th>
          <th>Total Present</th>
          <th>Attendance %</th>
        </tr>
      </thead>
      <tbody id="studentBody"></tbody>
    </table>
    
    <button class="danger-btn" style="width: 100%; margin-top: 20px;" onclick="downloadPDF()">📥 Download Attendance Report (PDF)</button>
  </main>

  <script src="js/api.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const classId = urlParams.get("class");
    let currentData = null;

    async function loadStudents() {
      const res = await api.get(`/attendance/${classId}`);
      if(res.success) {
          currentData = res;
          document.getElementById('subNameDisplay').innerText = res.class_name;
          document.getElementById('totalDaysDisplay').innerText = res.total_days;
          
          const tbody = document.getElementById("studentBody");
          tbody.innerHTML = "";
          
          res.students.forEach((stu) => {
            let badgeClass = stu.percentage >= 75 ? 'badge-green' : 'badge-red';
            let perfText = res.total_days === 0 ? "N/A" : `${stu.percentage}%`;

            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td><strong>${stu.roll_no}</strong></td>
              <td>
                  <label class="switch">
                      <input type="checkbox" data-roll="${stu.roll_no}" checked>
                      <span class="slider"></span>
                  </label>
              </td>
              <td>${stu.total_present} / ${res.total_days}</td>
              <td><span class="${badgeClass}">${perfText}</span></td>
            `;
            tbody.appendChild(tr);
          });
      }
    }

    async function submitDailyAttendance() {
      if(!confirm("Submit today's attendance?")) return;
      
      const presentRolls = [...document.querySelectorAll("input[type=checkbox]:checked")]
                            .map(cb => parseInt(cb.dataset.roll));
                            
      const res = await api.post(`/attendance/${classId}/submit`, { present_rolls: presentRolls });
      if(res.success) {
          alert("Attendance Saved!");
          loadStudents();
      }
    }

    function resetTodayCheckboxes() {
        document.querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = false);
    }

    function downloadPDF() {
        if(!currentData) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(18);
        doc.text(`Attendance Report - ${currentData.class_name}`, 14, 20);
        doc.setFontSize(12);
        doc.text(`Total Days Taught: ${currentData.total_days}`, 14, 30);

        const tableHeaders = [["Roll No.", "Total Present", "Percentage (%)"]];
        const tableRows = currentData.students.map(stu => {
            return [stu.roll_no, stu.total_present, `${stu.percentage}%`];
        });

        doc.autoTable({
            head: tableHeaders,
            body: tableRows,
            startY: 40,
            theme: 'grid',
            headStyles: { fillColor: [40, 167, 69] }
        });

        doc.save(`Attendance_${currentData.class_name.replace(/\\s+/g, '_')}.pdf`);
    }

    loadStudents();
  </script>
</body>
</html>
